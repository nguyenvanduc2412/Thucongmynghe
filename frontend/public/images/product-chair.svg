<svg viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" style="stop-color:#c4a678;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6f47;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Chair back -->
  <rect x="100" y="40" width="100" height="120" rx="8" fill="url(#woodGrad)" />
  <!-- Chair seat -->
  <ellipse cx="150" cy="160" rx="70" ry="30" fill="#a0826d" />
  <!-- Left leg -->
  <rect x="80" y="190" width="14" height="80" rx="4" fill="#6b5344" />
  <!-- Right leg -->
  <rect x="206" y="190" width="14" height="80" rx="4" fill="#6b5344" />
  <!-- Back detail -->
  <rect x="110" y="50" width="80" height="6" rx="2" fill="#9a7d66" opacity="0.7" />
  <rect x="110" y="75" width="80" height="6" rx="2" fill="#9a7d66" opacity="0.7" />
  <rect x="110" y="100" width="80" height="6" rx="2" fill="#9a7d66" opacity="0.7" />
</svg>
