<svg viewBox="0 0 300 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cabinet" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" style="stop-color:#b8956a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a5f3f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Cabinet body -->
  <rect x="50" y="40" width="200" height="180" rx="6" fill="url(#cabinet)" />
  <!-- Door 1 -->
  <rect x="60" y="50" width="85" height="160" rx="4" fill="#a0826d" stroke="#6b5344" stroke-width="2" />
  <!-- Door 2 -->
  <rect x="155" y="50" width="85" height="160" rx="4" fill="#a0826d" stroke="#6b5344" stroke-width="2" />
  <!-- Door handles -->
  <circle cx="100" cy="130" r="4" fill="#6b5344" />
  <circle cx="200" cy="130" r="4" fill="#6b5344" />
  <!-- Base -->
  <rect x="50" y="220" width="200" height="12" rx="2" fill="#6b5344" />
</svg>
